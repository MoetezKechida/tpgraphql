interface InfosGeneral{
    id: Int!
}
interface Infos{
    id: Int!
    name: String!
}
type Cv implements InfosGeneral & Infos {
    id: Int!
    name: String!
    age: Int
    job: String
    skills: [Skill!]!
    user: User!
    deletedAt: String
}
type Skill implements InfosGeneral {
    id: Int!
    designation: String!
    cvs: [Cv!]
}
type User implements InfosGeneral & Infos {
    id: Int!
    name: String!
    email: String!
    role: Role!
    cv: [Cv!]
}
enum Role{
    USER 
    ADMIN
}
input CreateCvInput {
    name:   String!
    age:    Int
    job:    String
    userId: Int!
    skillIds: [Int!]!
}
input UpdateCvInput {
    name:     String
    age:      Int
    job:      String
    userId:   Int
    skillIds: [Int!]
}
type Query{
    cv(id: Int): Cv
    cvs: [Cv]
}
type Mutation {
    addCv(input: CreateCvInput!): Cv!
    updateCv(id: Int!, input: UpdateCvInput!): Cv!
    deleteCv(id: Int!): Cv!
}

type Subscription {
    cv: SubscriptionPayload!
}
type SubscriptionPayload {
    mutation: MutationType!
    cv: Cv!
}
enum MutationType {
    CREATED
    UPDATED
    DELETED
}
